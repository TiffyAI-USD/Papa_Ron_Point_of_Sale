<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAPA RON'S PREMIUM POS</title>
    <style>
        :root {
            --primary: #d4a373;
            --bg: #000000;
            --surface: #121212;
            --surface-light: #1e1e1e;
            --accent: #44ff44;
            --danger: #ff4444;
            --warning: #ff9800;
            --gold-grad: linear-gradient(145deg, #d4a373, #b38b59, #8a6d4b);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: #fff; 
            margin: 0; 
            padding: 8px; 
            overflow-x: hidden;
        }

        /* PC / DESKTOP OPTIMIZATION */
        @media (min-width: 1024px) {
            #app-body {
                max-width: 1200px;
                margin: 0 auto;
                padding: 20px;
                background: #080808;
                border-left: 1px solid #222;
                border-right: 1px solid #222;
                min-height: 100vh;
            }
            .grid-main { grid-template-columns: repeat(4, 1fr) !important; }
            #pos-tab .grid-main { grid-template-columns: 1fr 1fr !important; }
        }

        /* LOGIN GATEWAY CSS */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box { background: var(--surface); padding: 30px; border-radius: 15px; border: 2px solid var(--primary); width: 85%; max-width: 320px; text-align: center; }
        .pin-display { font-size: 2.5rem; letter-spacing: 12px; margin-bottom: 25px; color: var(--primary); font-weight: 900; background: #000; padding: 10px; border-radius: 8px; min-height: 50px; }

        h1 { text-align: center; color: var(--primary); font-size: 1.4rem; letter-spacing: 2px; text-transform: uppercase; margin: 10px 0; font-weight: 900; }
        h3 { color: var(--primary); margin: 0; font-weight: 800; text-transform: uppercase; font-size: 0.9rem; }

        input, button, select { 
            font-size: 0.9rem; 
            padding: 12px; 
            margin: 4px 0; 
            width: 100%; 
            border-radius: 6px; 
            box-sizing: border-box; 
            border: 1px solid #333; 
            font-weight: 800;
        }

        button { 
            background: var(--gold-grad) !important; 
            color: #000 !important; 
            border: none !important; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-weight: 900; 
        }
        
        button:active { transform: scale(0.96); opacity: 0.8; }
        
        .grid-main { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .tab-content { display: none; margin-top: 10px; animation: fadeIn 0.3s ease; }
        .active-tab { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .category-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 6px; 
            background: var(--surface); 
            padding: 8px; 
            border-radius: 10px; 
            border: 1px solid #222;
        }

        .product-btn { 
            position: relative; 
            min-height: 65px; 
            font-size: 0.75rem; 
            color: #000 !important; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            border-radius: 6px; 
            font-weight: 900;
            padding: 4px;
            cursor: pointer;
            text-transform: uppercase;
            background: var(--gold-grad);
            border-bottom: 3px solid #8a6d4b;
        }

        #trans-tabs { display: flex; gap: 4px; overflow-x: auto; padding: 4px 0; }
        .tab-btn { width: auto; padding: 8px 16px; background: #222 !important; color: #777 !important; white-space: nowrap; border: 1px solid #333 !important; font-size: 0.8rem; }
        .tab-btn.active { background: var(--gold-grad) !important; color: #000 !important; border-color: #fff !important; }

        #cart-list { background: var(--surface); border-radius: 8px; padding: 8px; margin: 8px 0; max-height: 200px; overflow-y: auto; border: 1px solid #222; }
        .cart-row { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 6px 0; align-items: center; font-size: 0.85rem; font-weight: 700; }
        #total-view { font-size: 2.5rem; color: var(--accent); text-align: center; margin: 5px 0; font-family: monospace; font-weight: 900; }

        .stock-row { display: grid; grid-template-columns: 35px 1.5fr 0.8fr 0.8fr 100px; align-items: center; background: var(--surface); margin-bottom: 4px; padding: 6px; border-radius: 6px; gap: 4px; border: 1px solid #222; font-size: 0.8rem; text-align: center; font-weight: 700; }
        .stock-status-low { color: var(--danger); font-weight: 900; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }

        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 20px; border-radius: 12px; width: 90%; max-width: 500px; z-index: 1000; border: 2px solid var(--primary); display: none; }
        
        .stock-footer { background: var(--surface-light); padding: 12px; border-radius: 8px; margin-top: 10px; border: 1px dashed var(--primary); text-align: center; font-weight: 800; line-height: 1.6; }
        
        .btn-small { padding: 6px; font-size: 0.7rem; border-radius: 4px; width: auto; }

        .distro-box { background: var(--surface-light); border: 2px solid var(--warning); padding: 15px; border-radius: 10px; margin-top: 15px; }
        
        /* SCROLLABLE STAFF MODAL */
        #staff-name-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            max-height: 350px; 
            overflow-y: auto; 
            padding-right: 5px;
            margin-top: 15px;
        }

        /* Custom Scrollbar for staff list */
        #staff-name-grid::-webkit-scrollbar { width: 8px; }
        #staff-name-grid::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

        .search-container { margin: 10px 0; position: relative; }
        #stock-search { background: #000; color: var(--primary); border: 1px solid var(--primary); padding-left: 35px; text-transform: uppercase; }
        .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--primary); pointer-events: none; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h1>STAFF LOGIN</h1>
            <div id="pin-screen" class="pin-display">****</div>
            <div class="grid-main" style="grid-template-columns: 1fr 1fr 1fr;">
                <button onclick="pP(1)">1</button><button onclick="pP(2)">2</button><button onclick="pP(3)">3</button>
                <button onclick="pP(4)">4</button><button onclick="pP(5)">5</button><button onclick="pP(6)">6</button>
                <button onclick="pP(7)">7</button><button onclick="pP(8)">8</button><button onclick="pP(9)">9</button>
                <button onclick="cP()" style="background:var(--danger)!important; color:#fff!important;">C</button>
                <button onclick="pP(0)">0</button>
                <button onclick="login()" style="background:var(--accent)!important;">OK</button>
            </div>
        </div>
    </div>

    <div id="app-body" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 10px;">
            <h1 style="margin: 0; font-size: 1.8rem;">Papa Ron's</h1>
            <div style="display: flex; gap: 8px;">
                <button onclick="printUserSales()" style="width: auto; padding: 8px 15px; font-size: 0.8rem;">CASH UP</button>
                <button onclick="logout()" style="width: auto; padding: 8px 15px; background: #333!important; color: #fff!important;">LOCK</button>
            </div>
        </div>
        <p id="staff-tag" style="text-align:right; color: var(--primary); font-weight: 900; margin-bottom: 15px;"></p>

        <div class="grid-main">
            <button onclick="switchTab('pos-tab')">Sales</button>
            <button onclick="secureSwitch('menu-tab')">Builder</button>
            <button onclick="secureSwitch('stock-tab')">Stock</button>
            <button onclick="secureSwitch('report-tab')">Reports</button>
        </div>

        <div id="pos-tab" class="tab-content active-tab">
            <div id="trans-tabs"></div>
            <button onclick="createNewTransaction()" style="padding: 15px; margin-bottom: 10px; font-size: 1.1rem; border: 1px solid var(--accent) !important;">+ NEW TABLE / ORDER</button>
            <div class="grid-main">
                <div class="category-grid" id="foodGrid"></div>
                <div class="category-grid" id="drinkGrid"></div>
            </div>
            <div id="cart-list"></div>
            <div id="total-view">R 0.00</div>
            <div class="grid-main">
                <button onclick="openTender()" style="height:70px; font-size: 1.4rem; background: var(--accent) !important;">TENDER</button>
                <button onclick="printKitchenSlip()" style="height:70px;">Kitchen Slip</button>
                <button onclick="markAsWastage()" style="background:transparent !important; border:1px solid var(--warning) !important; color:var(--warning) !important;">Wastage</button>
                <button onclick="adminVoid()" style="background:transparent !important; border:1px solid var(--danger) !important; color:var(--danger) !important;">Void Table</button>
            </div>
            <button onclick="openStaffSaleModal()" style="margin-top: 15px; height: 60px; background: #222 !important; color: var(--primary) !important; border: 2px solid var(--primary) !important;">STAFF SALE / TAB</button>
        </div>

        <div id="menu-tab" class="tab-content">
            <div style="background:var(--surface); padding:20px; border-radius:10px;">
                <h3>Product Builder</h3>
                <input type="text" id="m-name" placeholder="ITEM NAME">
                <div class="grid-main">
                    <input type="number" id="m-price" placeholder="Sell Price (R)">
                    <input type="number" id="m-cost" placeholder="Item Direct Cost (R)">
                </div>
                <select id="m-cat"><option value="food">Food Item</option><option value="drink">Drink Item</option></select>
                <p style="font-size: 0.75rem; color: var(--primary); margin: 15px 0 5px 0;">RECIPE (INGREDIENT | QTY | UNIT COST)</p>
                <div id="ing-rows"><div class="ing-grid"><input type="text" class="i-name" placeholder="e.g. Patty"><input type="number" class="i-qty" placeholder="Qty"><input type="number" class="i-cost" placeholder="Cost"></div></div>
                <button onclick="addIngRow()" class="btn-small" style="margin: 10px 0;">+ Add Ingredient</button>
                <button onclick="saveNewProduct()" style="margin-top:20px; font-size: 1.1rem;">SAVE PRODUCT</button>
            </div>
        </div>

        <div id="stock-tab" class="tab-content">
            <div class="distro-box" style="border: 2px solid var(--primary);">
                <h3>RECORD PURCHASE</h3>
                <input type="text" id="pur-name" placeholder="ITEM NAME">
                <input type="number" id="pur-qty" placeholder="QUANTITY">
                <input type="number" id="pur-cost" placeholder="TOTAL COST (R)">
                <input type="text" id="pur-cat" placeholder="CATEGORY (e.g. Seafood, Spirits)">
                <button onclick="logPurchase()" style="background:var(--accent)!important;">LOG PURCHASE & ADD STOCK</button>
            </div>
            <div style="background:var(--surface); padding:10px; border-radius:10px; margin-top:10px;">
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="stock-search" placeholder="SEARCH STOCK ITEMS..." oninput="renderStock()">
                </div>
                <div style="display:flex; gap:8px; margin-bottom: 10px;">
                    <button onclick="printSelectedStock()">Print Order List</button>
                    <button onclick="printPurchaseReport()" style="background:var(--warning)!important;">Purchase Report</button>
                    <button onclick="printFullValuationReport()">Full Valuation PDF</button>
                </div>
            </div>
            <div id="inventory-display"></div>
            <div class="stock-footer" id="stock-summary"></div>
        </div>

        <div id="report-tab" class="tab-content">
            <div style="background:var(--surface); padding:20px; border-radius:10px;">
                <h3>Sales Reports</h3>
                <div class="grid-main">
                    <button onclick="generateReport('daily')">Daily Report</button>
                    <button onclick="generateReport('weekly')">Weekly Report</button>
                    <button onclick="generateReport('monthly')">Monthly Report</button>
                </div>
                <hr style="margin:25px 0; border:1px solid #333;">
                <h3>Staff Tabs / Monthly Sales</h3>
                <button onclick="printStaffReport('all')" style="background:var(--warning) !important; margin-bottom: 10px;">PRINT MASTER STAFF REPORT</button>
                <select id="individual-staff-select" style="margin-bottom: 5px;"></select>
                <button onclick="printStaffReport(document.getElementById('individual-staff-select').value)">PRINT INDIVIDUAL REPORT</button>
                <button onclick="clearStaffSales()" style="background:var(--danger) !important; color:#fff !important; margin-top: 20px; font-size: 0.8rem;">RESET ALL STAFF TABS</button>
            </div>
        </div>
    </div>

    <div id="staff-sale-modal" class="modal">
        <h2 style="color:var(--primary); text-align:center; margin-bottom: 0;">SELECT STAFF NAME</h2>
        <p style="text-align:center; font-size: 0.8rem; color: #777;">Scroll down for more names</p>
        <div id="staff-name-grid"></div>
        <button onclick="closeModal()" style="margin-top:20px; background:#333 !important; color:#fff !important;">CANCEL</button>
    </div>

    <div id="tender-modal" class="modal">
        <h1 id="cash-total-needed" style="text-align:center; color:var(--accent);"></h1>
        <input type="number" id="tender-amt" placeholder="Amount Received" oninput="calculateDifference()" autofocus>
        <h2 id="diff-display" style="text-align:center; font-weight: 900;">Change: R0.00</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
            <button onclick="finalizeSale('Cash')" style="height: 60px;">CASH</button>
            <button onclick="finalizeSale('Card')" style="height: 60px;">CARD</button>
        </div>
        <button onclick="closeModal()" style="margin-top:10px;">Back</button>
    </div>

    <div id="stock-modal" class="modal"><h2 id="stock-item-name" style="text-align:center;"></h2><input type="number" id="stock-add-amt" placeholder="Qty to Add"><button onclick="confirmStockAdd()">Add to Stock</button><button onclick="closeModal()" style="margin-top:8px;">Cancel</button></div>

    <script>
        let pinStr = "";
        let currentUser = "";
        const ADMIN_PIN = "1010";
        const STAFF_PINS = {"1010": "Sean", "7711": "Cats", "7777": "King Ron", "2266": "Local", "2255": "Jay", "2244": "Ben", "2233": "Lim", "2211": "Andisiwe", "1199": "Lungile", "1188": "Jon", "1177": "Megan", "1166": "Sweswe", "1155": "Siyamcela", "1144": "Luciano", "1133": "Tyran", "1122": "Sive", "2020": "Zuko", "1999": "Lee", "1992": "Jonice", "1234": "Beranise", "1111": "Momo", "2222": "Zet", "3333": "Marshall", "4444": "Hans", "2015": "Regan", "5555": "Don"};

        function pP(n) { if(pinStr.length < 4) { pinStr += n; document.getElementById('pin-screen').textContent = "*".repeat(pinStr.length); } }
        function cP() { pinStr = ""; document.getElementById('pin-screen').textContent = "****"; }
        function logout() { location.reload(); }
        function login() {
            if(STAFF_PINS[pinStr]) {
                currentUser = STAFF_PINS[pinStr];
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-body').style.display = 'block';
                document.getElementById('staff-tag').textContent = "OPERATOR: " + currentUser.toUpperCase();
                startApp();
            } else { alert("WRONG PIN"); cP(); }
        }

        let inventory = JSON.parse(localStorage.getItem('pos_inv')) || {};
        let recipes = JSON.parse(localStorage.getItem('pos_rec')) || {};
        let transactions = JSON.parse(localStorage.getItem('pos_trans')) || [];
        let purchaseLog = JSON.parse(localStorage.getItem('pos_purchases')) || []; 
        let staffSales = JSON.parse(localStorage.getItem('pos_staff_sales')) || {}; 
        let currentTransIdx = -1;
        let selectedStockKey = "";

        function startApp() {
            if (transactions.filter(t => t.status === 'active').length === 0) {
                transactions.push({id: transactions.length + 1, items: [], status: 'active', date: new Date().getTime()});
            }
            currentTransIdx = transactions.findIndex(t => t.status === 'active');
            populateStaffUI();
            renderPOS(); renderStock(); updateValuation();
        }

        function save() {
            localStorage.setItem('pos_inv', JSON.stringify(inventory));
            localStorage.setItem('pos_rec', JSON.stringify(recipes));
            localStorage.setItem('pos_trans', JSON.stringify(transactions));
            localStorage.setItem('pos_purchases', JSON.stringify(purchaseLog));
            localStorage.setItem('pos_staff_sales', JSON.stringify(staffSales));
            updateValuation();
        }

        function populateStaffUI() {
            const grid = document.getElementById('staff-name-grid');
            const select = document.getElementById('individual-staff-select');
            grid.innerHTML = ''; select.innerHTML = '';
            Object.values(STAFF_PINS).sort().forEach(name => {
                grid.innerHTML += `<button onclick="finalizeStaffSale('${name}')" style="min-height:50px;">${name}</button>`;
                select.innerHTML += `<option value="${name}">${name}</option>`;
            });
        }

        function openStaffSaleModal() {
            const t = transactions[currentTransIdx];
            if (!t || t.items.length === 0) return alert("Cart is empty.");
            document.getElementById('staff-sale-modal').style.display = 'block';
        }

        function finalizeStaffSale(staffName) {
            const t = transactions[currentTransIdx];
            if (!staffSales[staffName]) staffSales[staffName] = [];
            t.items.forEach(it => {
                staffSales[staffName].push({ name: it.name, price: it.price, date: new Date().getTime() });
                if(inventory[it.code]) inventory[it.code].stock--; 
                if(recipes[it.code]) { for(let ing in recipes[it.code]) if(inventory[ing]) inventory[ing].stock -= recipes[it.code][ing]; }
            });
            alert(`TAB RECORDED: ${staffName}`);
            save(); createNewTransaction(); closeModal();
        }

        function printStaffReport(filter) {
            let win = window.open('', '', 'width=450,height=700');
            let content = `<h2>PAPA RON'S STAFF REPORT</h2><p>Export Date: ${new Date().toLocaleString()}</p><hr>`;
            if (filter === 'all') {
                let grandTotal = 0;
                for (let staff in staffSales) {
                    let total = staffSales[staff].reduce((sum, item) => sum + item.price, 0);
                    if(total > 0) { content += `<p><b>${staff}:</b> R${total.toFixed(2)}</p>`; grandTotal += total; }
                }
                content += `<hr><h3>GRAND STAFF DEBT: R${grandTotal.toFixed(2)}</h3>`;
            } else {
                let data = staffSales[filter] || [];
                content += `<h3>Staff: ${filter}</h3>`;
                let total = 0;
                data.forEach(s => { content += `<div style="display:flex; justify-content:space-between; font-size:0.9rem;"><span>${s.name}</span><span>R${s.price.toFixed(2)}</span></div>`; total += s.price; });
                content += `<hr><h4>TOTAL DUE: R${total.toFixed(2)}</h4>`;
            }
            win.document.write(`<html><body style="font-family:sans-serif; padding:30px; line-height:1.6;">${content}</body></html>`);
            win.document.close(); win.print();
        }

        function clearStaffSales() {
            if (prompt("ADMIN PIN TO CLEAR ALL TABS:") === ADMIN_PIN) {
                if(confirm("Wipe all staff accounts?")) { staffSales = {}; save(); alert("Accounts cleared."); populateStaffUI(); }
            } else { alert("ACCESS DENIED"); }
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-tab');
            if(id === 'pos-tab') renderPOS();
            if(id === 'stock-tab') renderStock();
        }

        function secureSwitch(id) {
            if (prompt("ADMIN PIN REQUIRED:") === ADMIN_PIN) switchTab(id);
            else alert("UNAUTHORIZED");
        }

        function renderPOS() {
            const f = document.getElementById('foodGrid'), d = document.getElementById('drinkGrid'), tTabs = document.getElementById('trans-tabs');
            f.innerHTML = ''; d.innerHTML = ''; tTabs.innerHTML = '';
            Object.keys(inventory).forEach(key => {
                if(inventory[key].category === 'ingredient') return;
                const btn = document.createElement('div'); btn.className = `product-btn`;
                btn.innerHTML = `<div style="width:100%" onclick="addToCart('${key}')"><b>${inventory[key].name}</b><br>R${inventory[key].price.toFixed(2)}</div>`;
                inventory[key].category === 'food' ? f.appendChild(btn) : d.appendChild(btn);
            });
            transactions.forEach((t, i) => {
                if(t.status !== 'active') return;
                const btn = document.createElement('button'); btn.className = `tab-btn ${i === currentTransIdx ? 'active' : ''}`;
                btn.textContent = `Table ${t.id}`; btn.onclick = () => { currentTransIdx = i; renderPOS(); }; tTabs.appendChild(btn);
            });
            updateCartUI();
        }

        function addToCart(key) { 
            if (currentTransIdx === -1) createNewTransaction(); 
            transactions[currentTransIdx].items.push({...inventory[key], code: key}); 
            save(); updateCartUI(); 
        }

        function updateCartUI() {
            const list = document.getElementById('cart-list'); list.innerHTML = ''; let total = 0;
            if(transactions[currentTransIdx]) {
                transactions[currentTransIdx].items.forEach((it, i) => {
                    total += it.price;
                    list.innerHTML += `<div class="cart-row"><span>${it.name}</span><span>R${it.price.toFixed(2)} <button onclick="removeFromCart(${i})" style="background:var(--danger)!important; padding:2px 8px; margin-left:10px;">×</button></span></div>`;
                });
            }
            document.getElementById('total-view').textContent = `R ${total.toFixed(2)}`;
        }

        function removeFromCart(i) { transactions[currentTransIdx].items.splice(i, 1); save(); updateCartUI(); }

        function renderStock() {
            const cont = document.getElementById('inventory-display'), query = document.getElementById('stock-search').value.toUpperCase();
            cont.innerHTML = '<div style="display: grid; grid-template-columns: 35px 1.5fr 0.8fr 0.8fr 100px; padding: 5px; font-weight: 900; color: var(--primary); font-size: 0.65rem; text-align: center;"><span>PICK</span><span>ITEM</span><span>STOCK</span><span>PROFIT</span><span>ACTION</span></div>';
            Object.keys(inventory).sort().forEach(key => {
                const itm = inventory[key]; 
                if (query && !itm.name.toUpperCase().includes(query)) return;
                const profit = (itm.price || 0) - (itm.cost || 0);
                cont.innerHTML += `<div class="stock-row"><input type="checkbox" class="stock-check" value="${key}"><div style="text-align:left;"><b>${itm.name}</b></div><div class="${itm.stock<=5?'stock-status-low':''}">${itm.stock.toFixed(1)}</div><div>R${profit.toFixed(2)}</div><button onclick="openStockIn('${key}')" class="btn-small">Add</button></div>`;
            });
        }

        function logPurchase() {
            const name = document.getElementById('pur-name').value.toUpperCase(), qty = parseFloat(document.getElementById('pur-qty').value), cost = parseFloat(document.getElementById('pur-cost').value);
            if (!name || isNaN(qty)) return alert("Data missing");
            purchaseLog.push({ date: new Date().getTime(), name, qty, cost, cat: document.getElementById('pur-cat').value });
            const key = name.replace(/\s+/g, '_').toUpperCase();
            if (!inventory[key]) inventory[key] = { name, stock: qty, cost: cost/qty, price: 0, category: 'ingredient' };
            else { inventory[key].stock += qty; inventory[key].cost = cost/qty; }
            save(); renderStock(); alert("Stock updated.");
        }

        function finalizeSale(method) {
            const t = transactions[currentTransIdx]; if (!t || t.items.length === 0) return;
            const total = t.items.reduce((s, i) => s + i.price, 0), received = parseFloat(document.getElementById('tender-amt').value) || total;
            t.total = total; t.method = method; t.status = 'paid'; t.date = new Date().getTime(); t.staff = currentUser;
            t.tip = (method === 'Card') ? Math.max(0, received - total) : 0;
            t.items.forEach(it => {
                if(inventory[it.code]) inventory[it.code].stock--; 
                if(recipes[it.code]) for(let ing in recipes[it.code]) if(inventory[ing]) inventory[ing].stock -= recipes[it.code][ing];
            });
            save(); createNewTransaction(); closeModal();
        }

        function createNewTransaction() { transactions.push({id: transactions.length + 1, items: [], status:'active', date: new Date().getTime()}); currentTransIdx = transactions.length - 1; renderPOS(); }
        function openTender() { document.getElementById('tender-modal').style.display='block'; calculateDifference(); }
        function calculateDifference() {
            const total = transactions[currentTransIdx].items.reduce((s, i) => s + i.price, 0);
            const rec = parseFloat(document.getElementById('tender-amt').value) || 0;
            const diff = rec - total;
            document.getElementById('diff-display').textContent = diff >= 0 ? `Change: R${diff.toFixed(2)}` : `Short: R${Math.abs(diff).toFixed(2)}`;
            document.getElementById('diff-display').style.color = diff >= 0 ? 'var(--accent)' : 'var(--danger)';
        }
        function openStockIn(k) { selectedStockKey = k; document.getElementById('stock-item-name').textContent = inventory[k].name; document.getElementById('stock-modal').style.display = 'block'; }
        function confirmStockAdd() { const a = parseFloat(document.getElementById('stock-add-amt').value); if(a) { inventory[selectedStockKey].stock += a; save(); renderStock(); closeModal(); } }
        function addIngRow() { const div = document.createElement('div'); div.className = "ing-grid"; div.innerHTML = `<input type="text" class="i-name" placeholder="Item"><input type="number" class="i-qty" placeholder="Qty"><input type="number" class="i-cost" placeholder="Cost">`; document.getElementById('ing-rows').appendChild(div); }
        function saveNewProduct() {
            const name = document.getElementById('m-name').value.toUpperCase(), price = parseFloat(document.getElementById('m-price').value);
            if(!name || isNaN(price)) return alert("Check inputs");
            const id = "P_" + Date.now(); let recipe = {};
            document.querySelectorAll('#ing-rows .ing-grid').forEach(row => {
                const n = row.querySelector('.i-name').value.toUpperCase(), q = parseFloat(row.querySelector('.i-qty').value);
                if(n && q) recipe[n] = q;
            });
            inventory[id] = { name, price, cost: parseFloat(document.getElementById('m-cost').value)||0, category: document.getElementById('m-cat').value, stock: 0 };
            if(Object.keys(recipe).length > 0) recipes[id] = recipe;
            save(); location.reload();
        }
        function adminVoid() { if(prompt("ADMIN PIN:")===ADMIN_PIN) { transactions.splice(currentTransIdx, 1); startApp(); } }
        function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
        function updateValuation() { /* logic remains same as previous */ }
    </script>
</body>
</html>
